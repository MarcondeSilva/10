<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igreja Adpaz - Candelária</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #dfe7f0 100%);
            color: #0c2340;
            padding-top: 95px;
            padding-bottom: 95px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: -0.2px;
        }

        /* Cabeçalho Fixo estilo Vidro Fosco (Glassmorphism) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: rgba(122, 159, 178, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        header img {
            width: 210px;
            height: 50px;
            object-fit: contain;
        }

        /* Container Principal */
        .container {
            width: 100%;
            max-width: 410px;
            padding: 30px 24px;
            text-align: center;
            flex: 1;
        }

        /* Tipografia Premium */
        .boas-vindas h2 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 1.5rem;
            font-style: italic;
            font-weight: 400;
            color: #4a6b82;
            margin-bottom: 2px;
        }

        .boas-vindas h1 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #0c2340;
            letter-spacing: -1px;
            margin-bottom: 22px;
        }

        .chamada {
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 18px;
            color: #435b71;
            padding: 0 10px;
        }

        .interaja {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0c2340;
            margin-bottom: 22px;
            letter-spacing: -0.3px;
        }

        /* Badges/Links Discretos Lado a Lado - MELHORADO */
        .badges-container {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .badge-link {
            flex: 1;
            min-width: 120px;
            max-width: 200px;
            background: rgba(122, 159, 178, 0.15);
            color: #2a5270;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            padding: 10px 16px;
            border-radius: 50px;
            text-align: center;
            border: 1px solid rgba(122, 159, 178, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de fundo gradiente ao passar o mouse */
        .badge-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(122, 159, 178, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .badge-link:hover::before {
            left: 100%;
        }

        .badge-link:hover {
            background: rgba(122, 159, 178, 0.25);
            border-color: rgba(122, 159, 178, 0.6);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(122, 159, 178, 0.25);
            color: #0c2340;
        }

        .badge-link:active {
            transform: translateY(0px) scale(0.97);
            box-shadow: 0 2px 10px rgba(122, 159, 178, 0.15);
            background: rgba(122, 159, 178, 0.35);
            transition-duration: 0.05s;
        }

        /* Moldura Premium da Galeria de Imagens */
        .slider-wrapper {
            width: 100%;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(12, 35, 64, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .slider-container {
            width: 100%;
            position: relative;
            padding-top: 62.5%;
            background-color: #0c2340;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
        }

        /* Indicadores de slide (pontinhos) */
        .slide-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            padding: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(122, 159, 178, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background: #2a5270;
            transform: scale(1.2);
            box-shadow: 0 2px 8px rgba(42, 82, 112, 0.3);
        }

        .dot:hover {
            background: rgba(42, 82, 112, 0.6);
            transform: scale(1.1);
        }

        /* Rodapé Fixo de Alto Padrão */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(122, 159, 178, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
        }

        footer .igreja-nome {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            text-transform: uppercase;
            color: #0c2340;
        }

        footer .endereco {
            font-size: 0.8rem;
            font-weight: 400;
            color: #ffffff;
            opacity: 0.95;
        }

        /* Responsividade para telas menores */
        @media (max-width: 480px) {
            .badge-link {
                min-width: 100px;
                font-size: 0.8rem;
                padding: 8px 12px;
            }
            
            .badges-container {
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Igreja Adpaz Candelária">
    </header>

    <div class="container">

        <div class="boas-vindas">
            <h2>Seja muito</h2>
            <h1>Bem-vindo!</h1>
        </div>

        <p class="chamada">Se você chegou aqui, certamente está vendo a nossa programação.</p>

        <p class="interaja">Click e interaja conosco!</p>

        <div class="badges-container">
            <a href="https://wa.me/5584988862621?text=-%20Quero%20aceitar%20Jesus!" target="_blank" class="badge-link">Quero aceitar Jesus!</a>
            <a href="https://wa.me/5584988862621?text=-%20eu%20tamb%C3%A9m%20quero" target="_blank" class="badge-link">Link 2</a>
        </div>

        <div class="slider-wrapper">
            <div class="slider-container">
                <div class="slide active" style="background-image: url('slide1.png');"></div>
                <div class="slide" style="background-image: url('slide2.png');"></div>
                <div class="slide" style="background-image: url('slide3.png');"></div>
                <div class="slide" style="background-image: url('slide4.png');"></div>
                <div class="slide" style="background-image: url('slide5.png');"></div>
            </div>
        </div>

        <!-- Indicadores de slide -->
        <div class="slide-indicators" id="indicators">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
            <span class="dot" data-index="3"></span>
            <span class="dot" data-index="4"></span>
        </div>

    </div>

    <footer>
        <div class="igreja-nome">ADPAZ – Candelária</div>
        <div class="endereco">Avenida sol da barra 215 Natal RN</div>
    </footer>

    <script>
        // ========== SLIDES CORRIGIDOS ==========
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentSlide = 0;
        const slideInterval = 10000; // 10 segundos
        let slideTimer;

        // Função para ir para um slide específico
        function goToSlide(index) {
            // Remove active de todos os slides
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            // Adiciona active no slide e dot correspondentes
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }

        // Função para ir para o próximo slide aleatório
        function changeSlideRandomly() {
            let nextSlide;
            do {
                nextSlide = Math.floor(Math.random() * slides.length);
            } while (nextSlide === currentSlide && slides.length > 1);
            
            goToSlide(nextSlide);
        }

        // Função para reiniciar o timer
        function resetTimer() {
            clearInterval(slideTimer);
            slideTimer = setInterval(changeSlideRandomly, slideInterval);
        }

        // Adicionar evento de clique nos dots
        dots.forEach((dot, index) => {
            dot.addEventListener('click', function() {
                if (index !== currentSlide) {
                    goToSlide(index);
                    resetTimer(); // Reinicia o timer quando o usuário clica
                }
            });

            // Efeito hover nos dots
            dot.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.2)';
            });
            
            dot.addEventListener('mouseleave', function() {
                if (!this.classList.contains('active')) {
                    this.style.transform = 'scale(1)';
                }
            });
        });

        // Iniciar o slider
        slideTimer = setInterval(changeSlideRandomly, slideInterval);

        // Pausar o slider quando o mouse estiver sobre o slider (melhora UX)
        const sliderWrapper = document.querySelector('.slider-wrapper');
        sliderWrapper.addEventListener('mouseenter', function() {
            clearInterval(slideTimer);
        });
        
        sliderWrapper.addEventListener('mouseleave', function() {
            slideTimer = setInterval(changeSlideRandomly, slideInterval);
        });

        // ========== EFEITOS NOS LINKS MELHORADOS ==========
        document.querySelectorAll('.badge-link').forEach(link => {
            // Efeito de clique com ripple
            link.addEventListener('click', function(e) {
                // Cria um efeito visual de clique
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });

        console.log('✅ Slides funcionando a cada 10 segundos!');
    </script>
</body>
</html>
