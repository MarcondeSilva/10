<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auri autopeças - Culto de Oração</title>
    <style>
        :root {
            --bg-dark: #1a1614;
            --gold: #c5a059;
            --text-light: #f4ece2;
            --text-sub: #d1c5b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at center, #2d2622 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            padding-top: 80px;
            padding-bottom: 90px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 65px;
            background: rgba(30, 25, 23, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        header img { width: 270px; height: 60px; object-fit: contain; }

        .container { width: 100%; max-width: 420px; padding: 20px; text-align: center; }

        .boas-vindas h2 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 1.3rem; font-style: italic; color: var(--gold);
        }

        .boas-vindas h1 {
            font-family: 'Playfair Display', 'Georgia', serif;
            font-size: 2.2rem; font-weight: 800; color: #ffffff;
            margin-bottom: 15px;
        }

        .chamada { font-size: 1rem; line-height: 1.5; margin-bottom: 15px; color: var(--text-sub); }

        .interaja { font-size: 1.1rem; font-weight: 600; color: var(--gold); margin-bottom: 20px; }

        .badges-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            width: 100%;
            padding: 0 10px;
        }

        .badge-link {
            width: 100%;
            display: block;
            height: 40px;
            line-height: 40px;
            background: rgba(197, 160, 89, 0.1);
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 50px;
            border: 1px solid rgba(197, 160, 89, 0.4);
            transition: all 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-link:hover {
            background: rgba(197, 160, 89, 0.2);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transform: translateY(-2px);
        }

        .slider-wrapper {
            width: 100%; position: relative; border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(197, 160, 89, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .slider-container { width: 100%; position: relative; padding-top: 62.5%; background-color: #000; }

        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.2s ease-in-out;
            background-size: cover; background-position: center;
        }

        .slide.active { opacity: 1; }

        .slide-indicators {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(197, 160, 89, 0.3);
            margin: 0 4px; cursor: pointer; transition: all 0.3s;
        }

        .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(30, 25, 23, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(197, 160, 89, 0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        footer .igreja-nome { font-size: 0.9rem; font-weight: 700; color: var(--gold); text-transform: uppercase; }
        footer .endereco { font-size: 0.75rem; color: var(--text-sub); margin-top: 2px;}
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Igreja Adpaz Candelária">
    </header>

    <div class="container">
        <div class="boas-vindas">
            <h2>Seja muito</h2>
            <h1>Bem-vindo!</h1>
        </div>

        <p class="chamada" id="frase-dinamica">Carregando...</p>
        
        <p class="interaja">Clique e interaja conosco!</p>

        <div class="badges-container">
            <!-- Troque SEU_NUMERO pelo número com DDD (ex: 5584999999999) -->
<a href="https://wa.me/5584988862621?text=Quero%20aceitar%20Jesus%20como%20o%20meu%20salvador!" target="_blank" class="badge-link">Quero aceitar Jesus</a>

<a href="https://wa.me/5584988862621?text=Eu%20desejo%20pedir%20oração%20por%20mim%20e%20por%20minha%20família." target="_blank" class="badge-link">Eu quero Oração</a>
        </div>

        <div class="slider-wrapper">
            <div class="slider-container">
                <div class="slide active" style="background-image: url('slide1.webp');"></div>
                <div class="slide" style="background-image: url('slide2.webp');"></div>
                <div class="slide" style="background-image: url('slide3.webp');"></div>
                <div class="slide" style="background-image: url('slide4.webp');"></div>
                <div class="slide" style="background-image: url('slide5.webp');"></div>
		<div class="slide" style="background-image: url('slide6.webp');"></div>
 		<div class="slide" style="background-image: url('slide7.webp');"></div>
 		<div class="slide" style="background-image: url('slide8.webp');"></div>
                <div class="slide" style="background-image: url('slide9.webp');"></div>
                <div class="slide" style="background-image: url('slide10.webp');"></div>
            </div>
        </div>

        <div class="slide-indicators" id="indicators">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
            <span class="dot" data-index="3"></span>
            <span class="dot" data-index="4"></span>
        </div>
    </div>

    <footer>
        <div class="igreja-nome">AURI AUTOPEÇAS – Culto de Oração</div>
        <div class="endereco">Todas as segundas e sextas-feiras, às 07:00h</div>
    </footer>

    <script>
        // --- SLIDER ---
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        let currentSlide = 0;
        const slideInterval = 5000;
        let slideTimer;

        function goToSlide(index) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }

        function changeSlideRandomly() {
            let next;
            do { next = Math.floor(Math.random() * slides.length); } while (next === currentSlide);
            goToSlide(next);
        }

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                goToSlide(index);
                clearInterval(slideTimer);
                slideTimer = setInterval(changeSlideRandomly, slideInterval);
            });
        });

        slideTimer = setInterval(changeSlideRandomly, slideInterval);

        // --- MENSAGEM DINÂMICA ---
        const mensagens = [
            "Se você chegou aqui, isso não foi em vão. Deus quer falar contigo.",
            "Que bom ter você por aqui! Jesus te ama!.",
            "Sinta-se à vontade, queremos orar por você.",
            "A paz de Deus! Você não está sozinho. Deus está no controle!",
            "Deus pode todas as coisas. Seu caminho é perfeito, sua vontade é soberana!.",
            "Não te mandei Eu: Esforça-te e tem bom ânimo!.",
            "Prepare o seu coração para o que Deus tem para nós.",
            "Eu o Senhor tenho visto as tuas lutas. Entreg-me o teu caminho e confia, somente!",
            "Porque para Deus nada é impossível!.",
            "Ainda antes que houvesse dia, Eu sou. Agindo Deus quem impedirá!"
        ];

        function trocarFrase() {
            const elemento = document.getElementById('frase-dinamica');
            const aleatoria = mensagens[Math.floor(Math.random() * mensagens.length)];
            elemento.innerText = aleatoria;
        }

        window.onload = trocarFrase;
    </script>
</body>
</html>
